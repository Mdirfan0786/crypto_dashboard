<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Track live cryptocurrency and stock prices with real-time charts."
    />

    <title>CryptoDash – Real-Time Market Tracker</title>

    <!-- CSS (use absolute paths for Vite stability) -->
    <link rel="stylesheet" href="/src/css/base.css" />
    <link rel="stylesheet" href="/src/css/layout.css" />
    <link rel="stylesheet" href="/src/css/components.css" />
    <link rel="stylesheet" href="/src/css/dashboard.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
  </head>

  <body>
    <!-- Header -->
    <div id="header"></div>

    <!-- Main Dashboard -->
    <main class="dashboard">
      <h1>CryptoDash</h1>

      <input
        type="text"
        id="search"
        placeholder="Search for Bitcoin, Ethereum..."
      />

      <div id="results"></div>

      <section id="favorites">
        <h2>My Favorites</h2>
        <ul id="favList"></ul>
      </section>

      <canvas id="priceChart"></canvas>

      <!-- all coins -->
      <section class="all-coins">
        <h2>All Coins</h2>
        <div id="coinsGrid"></div>
      </section>
    </main>

    <!-- Footer -->
    <div id="footer"></div>

    <!-- JS -->
    <script type="module" src="/src/js/main.js"></script>
  </body>
</html>
